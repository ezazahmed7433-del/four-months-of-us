<!DOCTYPE html>
<html lang="bn">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Find Ezaz — A Journey</title>

<style>

/* =====================================================
   BASIC
===================================================== */

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

html,
body {
    width: 100%;
    height: 100%;
    overflow: hidden;
}

body {
    background: #05030b;
    color: white;
    font-family:
        Georgia,
        "Noto Serif Bengali",
        serif;
    touch-action: none;
}


/* =====================================================
   SCREENS
===================================================== */

.screen {

    position: fixed;

    inset: 0;

    display: none;

    align-items: center;

    justify-content: center;

    text-align: center;

    z-index: 5000;

    background:
        radial-gradient(
            circle at center,
            #24153c,
            #090611 70%
        );

    padding: 25px;

}

.screen.active {
    display: flex;
}


/* =====================================================
   START SCREEN
===================================================== */

.start-content {

    max-width: 600px;

}

.start-content h1 {

    font-size: clamp(
        40px,
        10vw,
        80px
    );

    margin-bottom: 15px;

    text-shadow:
        0 0 20px #b86cff,
        0 0 60px #7d39bb;

}

.start-content p {

    color: #d8cde4;

    line-height: 1.8;

    margin-bottom: 30px;

}


.main-button {

    padding:
        15px
        35px;

    border: none;

    border-radius: 30px;

    background:
        linear-gradient(
            135deg,
            #a45bea,
            #d96be5
        );

    color: white;

    font-family: inherit;

    font-size: 18px;

    cursor: pointer;

    box-shadow:
        0 0 25px
        rgba(190,100,255,.5);

}


/* =====================================================
   GAME CAMERA
===================================================== */

#camera {

    position: fixed;

    inset: 0;

    overflow: hidden;

    background: #07100f;

}


/* =====================================================
   WORLD
===================================================== */

#world {

    position: absolute;

    width: 2600px;

    height: 1900px;

    background:

        radial-gradient(
            ellipse at center,
            #244943,
            #142f2e 45%,
            #081817 100%
        );

    transition:
        transform .05s linear;

}


/* =====================================================
   SKY
===================================================== */

#sky {

    position: absolute;

    left: 0;

    top: 0;

    width: 2600px;

    height: 900px;

    background:

        linear-gradient(
            180deg,
            #07040f,
            #17102b 45%,
            #294146
        );

}


/* =====================================================
   MOON
===================================================== */

#moon {

    position: absolute;

    width: 130px;

    height: 130px;

    left: 2100px;

    top: 110px;

    border-radius: 50%;

    background:
        radial-gradient(
            circle at 35% 30%,
            white,
            #fff1c5 60%,
            #d8c9f5
        );

    box-shadow:

        0 0 30px #fff0c0,

        0 0 90px
        rgba(220,190,255,.6);

}


/* =====================================================
   STARS
===================================================== */

.star {

    position: absolute;

    width: 3px;

    height: 3px;

    border-radius: 50%;

    background: white;

    box-shadow:
        0 0 8px white;

    animation:
        twinkle
        2s
        infinite
        alternate;

}

@keyframes twinkle {

    from {
        opacity: .2;
    }

    to {
        opacity: 1;
    }

}


/* =====================================================
   GROUND
===================================================== */

#ground {

    position: absolute;

    top: 650px;

    left: 0;

    width: 2600px;

    height: 1250px;

    background:

        linear-gradient(
            180deg,
            #173a36,
            #0b2624
        );

}


/* =====================================================
   PATH
===================================================== */

.path {

    position: absolute;

    background:

        linear-gradient(
            90deg,
            #4a3e3a,
            #68574e,
            #4a3e3a
        );

    border-radius: 100px;

}

#path1 {

    left: 1150px;

    top: 650px;

    width: 220px;

    height: 1250px;

}

#path2 {

    left: 350px;

    top: 1100px;

    width: 1800px;

    height: 180px;

}


/* =====================================================
   TREES
===================================================== */

.tree {

    position: absolute;

    width: 120px;

    height: 190px;

}

.trunk {

    position: absolute;

    bottom: 0;

    left: 52px;

    width: 18px;

    height: 85px;

    background:

        linear-gradient(
            90deg,
            #171014,
            #513330,
            #171014
        );

}

.leaves {

    position: absolute;

    top: 0;

    left: 0;

    width: 120px;

    height: 125px;

    border-radius: 50%;

    background:

        radial-gradient(
            circle at 30% 25%,
            #4b7770,
            #285550 55%,
            #143c3b
        );

}


/* =====================================================
   HOUSE
===================================================== */

#house {

    position: absolute;

    left: 300px;

    top: 800px;

    width: 280px;

    height: 180px;

    background:

        linear-gradient(
            180deg,
            #503b51,
            #291f31
        );

    box-shadow:
        0 20px 50px
        rgba(0,0,0,.5);

}

#roof {

    position: absolute;

    left: -30px;

    top: -90px;

    width: 340px;

    height: 140px;

    background: #211927;

    clip-path:
        polygon(
            50% 0,
            100% 70%,
            0 70%
        );

}

#door {

    position: absolute;

    bottom: 0;

    left: 115px;

    width: 50px;

    height: 100px;

    background: #17101c;

}

.window {

    position: absolute;

    top: 45px;

    width: 55px;

    height: 65px;

    background: #ffe69a;

    box-shadow:
        0 0 25px #ffe69a;

}

#windowLeft {
    left: 30px;
}

#windowRight {
    right: 30px;
}


/* =====================================================
   PLAYER
===================================================== */

#player {

    position: absolute;

    width: 60px;

    height: 95px;

    z-index: 100;

}

#playerHair {

    position: absolute;

    top: 0;

    left: 7px;

    width: 46px;

    height: 48px;

    border-radius: 50%;

    background: #17101d;

}

#playerFace {

    position: absolute;

    top: 11px;

    left: 14px;

    width: 32px;

    height: 36px;

    border-radius: 45%;

    background: #d99b7a;

}

#playerBody {

    position: absolute;

    top: 45px;

    left: 8px;

    width: 44px;

    height: 48px;

    border-radius: 14px;

    background:

        linear-gradient(
            180deg,
            #c76de5,
            #70429c
        );

}


/* =====================================================
   CLUES
===================================================== */

.clue {

    position: absolute;

    width: 58px;

    height: 58px;

    border-radius: 50%;

    background:

        radial-gradient(
            circle,
            white 0%,
            #e8bdff 20%,
            #a74cff 55%,
            transparent 75%
        );

    box-shadow:

        0 0 20px #d08aff,

        0 0 50px #a94dff,

        0 0 100px
        rgba(170,70,255,.7);

    animation:

        floatClue
        2s
        ease-in-out
        infinite
        alternate;

    z-index: 80;

}

@keyframes floatClue {

    from {
        transform:
            translateY(0)
            scale(1);
    }

    to {
        transform:
            translateY(-12px)
            scale(1.12);
    }

}

#clue1 {

    left: 1750px;

    top: 1050px;

}

#clue2 {

    left: 650px;

    top: 1400px;

    display: none;

}

#clue3 {

    left: 2050px;

    top: 1500px;

    display: none;

}


/* =====================================================
   BOSS AREA
===================================================== */

#bossArea {

    position: absolute;

    left: 1150px;

    top: 760px;

    width: 220px;

    height: 220px;

    border-radius: 50%;

    border:
        3px solid
        rgba(170,80,255,.6);

    box-shadow:

        0 0 30px
        rgba(120,40,255,.4),

        inset 0 0 60px
        rgba(80,20,150,.5);

    display: none;

}


/* =====================================================
   BOSS BATTLE SCREEN
===================================================== */

#battleScreen {

    position: fixed;

    inset: 0;

    display: none;

    z-index: 6000;

    background:

        radial-gradient(
            circle,
            #30143d,
            #08030e
        );

    align-items: center;

    justify-content: center;

    flex-direction: column;

    padding: 20px;

}

#battleScreen.active {

    display: flex;

}

.battle-title {

    font-size: 30px;

    margin-bottom: 25px;

    text-shadow:
        0 0 20px #d46cff;

}

#boss {

    width: 150px;

    height: 150px;

    border-radius: 50%;

    background:

        radial-gradient(
            circle,
            #8f50c9,
            #24122f 60%,
            #08030e
        );

    box-shadow:

        0 0 30px #a54cff,

        0 0 100px
        rgba(170,50,255,.5);

    animation:

        bossFloat
        2s
        infinite
        alternate;

}

@keyframes bossFloat {

    from {
        transform:
            translateY(0);
    }

    to {
        transform:
            translateY(-12px);
    }

}


/* HEALTH */

.health-container {

    width: min(
        500px,
        90%
    );

    margin: 15px;

}

.health-label {

    margin-bottom: 5px;

}

.health-bar {

    width: 100%;

    height: 18px;

    background: #241b29;

    border-radius: 20px;

    overflow: hidden;

}

.health-fill {

    height: 100%;

    width: 100%;

    transition:
        width .3s;

}

#bossHealth {

    background:
        linear-gradient(
            90deg,
            #a32ce8,
            #e76cff
        );

}

#playerHealth {

    background:
        linear-gradient(
            90deg,
            #42d98b,
            #9affc7
        );

}


/* BATTLE BUTTONS */

.battle-buttons {

    display: flex;

    gap: 15px;

    margin-top: 25px;

}

.battle-button {

    padding:
        14px
        25px;

    border: none;

    border-radius: 25px;

    color: white;

    font-family: inherit;

    font-size: 16px;

    background:
        linear-gradient(
            135deg,
            #8747c7,
            #d45ce2
        );

}

.battle-button:disabled {

    opacity: .4;

}


/* =====================================================
   STORY
===================================================== */

#storyBox {

    position: fixed;

    left: 50%;

    bottom: 25px;

    transform:
        translateX(-50%);

    width: 90%;

    max-width: 600px;

    padding: 20px;

    background:
        rgba(10,5,20,.96);

    border:
        1px solid
        rgba(200,140,255,.5);

    border-radius: 18px;

    text-align: center;

    z-index: 4000;

    display: none;

    box-shadow:
        0 0 30px
        rgba(150,70,255,.4);

}

#storyText {

    line-height: 1.7;

}

#closeStory {

    margin-top: 15px;

    padding:
        10px
        25px;

    border: none;

    border-radius: 20px;

    background:
        linear-gradient(
            135deg,
            #9c5eea,
            #d568e8
        );

    color: white;

    font-family: inherit;

}


/* =====================================================
   FINAL
===================================================== */

#finalScreen {

    background:

        radial-gradient(
            circle,
            #321b47,
            #07040d
        );

}

.final-photo {

    width: min(
        85vw,
        400px
    );

    max-height: 45vh;

    object-fit: cover;

    border-radius: 15px;

    box-shadow:

        0 0 40px
        rgba(200,100,255,.5);

    margin:
        20px
        auto;

}


/* =====================================================
   TOP HUD
===================================================== */

#hud {

    position: fixed;

    top: 15px;

    left: 50%;

    transform:
        translateX(-50%);

    z-index: 1000;

    text-align: center;

    pointer-events: none;

}

#hud h2 {

    text-shadow:
        0 0 20px #b86cff;

}

#objective {

    margin-top: 5px;

    color: #ddd0e9;

}


/* =====================================================
   CONTROLS
===================================================== */

#controls {

    position: fixed;

    left: 20px;

    bottom: 20px;

    width: 170px;

    height: 170px;

    z-index: 2000;

}

.control {

    position: absolute;

    width: 55px;

    height: 55px;

    display: flex;

    align-items: center;

    justify-content: center;

    border-radius: 16px;

    background:
        rgba(30,20,50,.85);

    border:
        1px solid
        rgba(255,255,255,.25);

    color: white;

    font-size: 24px;

    user-select: none;

}

#up {

    top: 0;

    left: 57px;

}

#down {

    bottom: 0;

    left: 57px;

}

#left {

    top: 57px;

    left: 0;

}

#right {

    top: 57px;

    right: 0;

}


/* =====================================================
   RESPONSIVE
===================================================== */

@media
(max-width:600px) {

    #controls {

        transform:
            scale(.8);

        transform-origin:
            bottom left;

    }

    .battle-title {

        font-size: 24px;

    }

}

</style>

</head>


<body>


<!-- =====================================================
     MUSIC
===================================================== -->

<audio
    id="bgMusic"
    loop>

    <source
        src="until.mp3"
        type="audio/mpeg">

</audio>


<!-- =====================================================
     START SCREEN
===================================================== -->

<div
    id="startScreen"
    class="screen active">

    <div
        class="start-content">

        <h1>

        </h1>

        <p>

            Misty, Ezaz কোথাও হারিয়ে গেছে।

            <br><br>

            তাকে খুঁজে পেতে হলে তোমাকে

        </div>


    </div>

</div>


<!-- =====================================================
     HUD

        প্রথম clue-টা খুঁজে বের করো...

<!-- =====================================================
     STORY BOX
===================================================== -->

<div id="storyBox">

    <div id="storyText"></div>

    <button

    <!-- BOSS HEALTH -->

    <div class="health-container">

        <div class="health-label">

            Shadow Health

        </div>

        <div class="health-bar">

            <div
                id="bossHealth"
                class="health-fill">
