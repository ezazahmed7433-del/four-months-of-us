<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

<title>Find Ezaz — World</title>

<style>

/* =========================
   BASIC
========================= */

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

html,
body {

    width: 100%;
    height: 100%;

    overflow: hidden;

}

body {

    background: #05030c;

    color: white;

    font-family:
        Georgia,
        "Noto Serif Bengali",
        serif;

}


/* =========================
   WORLD
========================= */

#world {

    position: fixed;

    inset: 0;

    overflow: hidden;

    background:

        radial-gradient(
            circle at 50% 15%,
            #4c3a70 0%,
            #211735 40%,
            #0b0a16 75%,
            #05030c 100%
        );

}


/* =========================
   MOON
========================= */

#moon {

    position: absolute;

    width: 110px;

    height: 110px;

    top: 8%;

    right: 10%;

    border-radius: 50%;

    background:

        radial-gradient(
            circle at 35% 35%,
            #ffffff,
            #fff4cf 60%,
            #e9d9ff
        );

    box-shadow:

        0 0 25px #fff1c7,

        0 0 70px
        rgba(230,200,255,.6);

}


/* =========================
   STARS
========================= */

.star {

    position: absolute;

    width: 3px;

    height: 3px;

    border-radius: 50%;

    background: white;

    box-shadow:

        0 0 8px white;

    animation:

        twinkle
        2s
        ease-in-out
        infinite
        alternate;

}


@keyframes twinkle {

    from {

        opacity: .25;

    }

    to {

        opacity: 1;

    }

}


/* =========================
   GROUND
========================= */

#ground {

    position: absolute;

    left: 0;

    bottom: 0;

    width: 100%;

    height: 45%;

    background:

        linear-gradient(
            180deg,
            #152c2b,
            #0c201f
        );

}


/* =========================
   GRASS
========================= */

.grass {

    position: absolute;

    bottom: 44%;

    width: 100%;

    height: 20px;

    background:

        repeating-linear-gradient(
            90deg,
            #1c3935 0px,
            #1c3935 15px,
            #254b42 16px,
            #254b42 22px
        );

}


/* =========================
   TREES
========================= */

.tree {

    position: absolute;

    bottom: 38%;

    width: 100px;

    height: 170px;

}


.trunk {

    position: absolute;

    bottom: 0;

    left: 43px;

    width: 15px;

    height: 75px;

    background:

        linear-gradient(
            90deg,
            #1b1117,
            #49302e,
            #1b1117
        );

    border-radius: 5px;

}


.leaves {

    position: absolute;

    left: 0;

    top: 0;

    width: 100px;

    height: 110px;

    border-radius: 50%;

    background:

        radial-gradient(
            circle at 30% 30%,
            #46716b,
            #27504d 50%,
            #173b3a 80%
        );

    box-shadow:

        25px 20px 0 #234743,

        55px 5px 0 #1d403e;

}


/* =========================
   HOUSE
========================= */

#house {

    position: absolute;

    left: 50%;

    bottom: 43%;

    transform:
        translateX(-50%);

    width: 240px;

    height: 150px;

    background:

        linear-gradient(
            180deg,
            #49394d,
            #2a2033
        );

    border-radius: 5px;

    box-shadow:

        0 20px 50px
        rgba(0,0,0,.5);

}


/* ROOF */

#roof {

    position: absolute;

    left: -25px;

    top: -80px;

    width: 290px;

    height: 120px;

    background: #211927;

    clip-path:

        polygon(
            50% 0%,
            100% 70%,
            0% 70%
        );

}


/* DOOR */

#door {

    position: absolute;

    bottom: 0;

    left: 95px;

    width: 50px;

    height: 85px;

    background: #1b1220;

    border-radius:

        5px
        5px
        0
        0;

}


/* WINDOW */

.window {

    position: absolute;

    top: 35px;

    width: 45px;

    height: 55px;

    background:

        #ffe59c;

    box-shadow:

        0 0 25px #ffe59c;

}


#windowLeft {

    left: 30px;

}


#windowRight {

    right: 30px;

}


/* =========================
   PATH
========================= */

#path {

    position: absolute;

    left: 50%;

    bottom: 0;

    transform:
        translateX(-50%);

    width: 180px;

    height: 45%;

    background:

        linear-gradient(
            90deg,
            transparent,
            #5b4b48 30%,
            #675650 50%,
            #5b4b48 70%,
            transparent
        );

}


/* =========================
   TITLE
========================= */

#message {

    position: absolute;

    top: 7%;

    left: 50%;

    transform:
        translateX(-50%);

    width: 90%;

    text-align: center;

    z-index: 50;

}


#message h1 {

    font-size: 30px;

    text-shadow:

        0 0 20px
        rgba(190,130,255,.8);

}


#message p {

    margin-top: 10px;

    color: #d9cee5;

}


/* =========================
   MOBILE
========================= */

@media
(max-width: 600px) {

    #moon {

        width: 75px;

        height: 75px;

    }


    #house {

        width: 190px;

        height: 120px;

    }


    #roof {

        width: 230px;

        left: -20px;

        top: -65px;

    }


    #door {

        left: 75px;

        width: 40px;

        height: 65px;

    }


    .window {

        width: 35px;

        height: 40px;

        top: 25px;

    }


    #windowLeft {

        left: 20px;

    }


    #windowRight {

        right: 20px;

    }


    #message h1 {

        font-size: 25px;

    }

}

</style>

</head>


<body>


<div id="world">


    <!-- STARS -->

    <div class="star"
         style="left:8%;top:10%;">
    </div>

    <div class="star"
         style="left:18%;top:22%;">
    </div>

    <div class="star"
         style="left:30%;top:8%;">
    </div>

    <div class="star"
         style="left:42%;top:18%;">
    </div>

    <div class="star"
         style="left:55%;top:7%;">
    </div>

    <div class="star"
         style="left:68%;top:20%;">
    </div>

    <div class="star"
         style="left:78%;top:9%;">
    </div>

    <div class="star"
         style="left:90%;top:25%;">
    </div>


    <!-- MOON -->

    <div id="moon"></div>


    <!-- MESSAGE -->

    <div id="message">

        <h1>

            Find Ezaz 🌙

        </h1>

        <p>

            Misty, your journey begins here...

        </p>

    </div>


    <!-- GROUND -->

    <div id="ground"></div>


    <!-- GRASS -->

    <div class="grass"></div>


    <!-- PATH -->

    <div id="path"></div>


    <!-- TREES -->

    <div class="tree"
         style="left:5%;">

        <div class="leaves"></div>

        <div class="trunk"></div>

    </div>


    <div class="tree"
         style="left:22%;">

        <div class="leaves"></div>

        <div class="trunk"></div>

    </div>


    <div class="tree"
         style="right:20%;">

        <div class="leaves"></div>

        <div class="trunk"></div>

    </div>


    <div class="tree"
         style="right:4%;">

        <div class="leaves"></div>

        <div class="trunk"></div>

    </div>


    <!-- HOUSE -->

    <div id="house">


        <div id="roof"></div>


        <div
            class="window"
            id="windowLeft">
        </div>


        <div
            class="window"
            id="windowRight">
        </div>


        <div id="door"></div>


    </div>


</div>


</body>

</html>
