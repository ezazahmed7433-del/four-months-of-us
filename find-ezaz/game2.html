<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Find Ezaz — Journey</title>

<style>

/* =========================
   BASIC
========================= */

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

html,
body {

    width: 100%;
    height: 100%;

    overflow: hidden;

}

body {

    background: #05030c;

    color: white;

    font-family:
        Georgia,
        "Noto Serif Bengali",
        serif;

    touch-action: none;

}


/* =========================
   CAMERA
========================= */

#camera {

    position: fixed;

    inset: 0;

    overflow: hidden;

    background: #07100f;

}


/* =========================
   LARGE WORLD
========================= */

#world {

    position: absolute;

    width: 2400px;

    height: 1800px;

    background:

        radial-gradient(
            ellipse at center,
            #244443 0%,
            #173331 35%,
            #0e2425 65%,
            #081516 100%
        );

}


/* =========================
   SKY
========================= */

#sky {

    position: absolute;

    left: 0;

    top: 0;

    width: 2400px;

    height: 900px;

    background:

        linear-gradient(
            180deg,
            #080511,
            #17112b 45%,
            #263c42 100%
        );

}


/* =========================
   MOON
========================= */

#moon {

    position: absolute;

    width: 120px;

    height: 120px;

    left: 1900px;

    top: 120px;

    border-radius: 50%;

    background:

        radial-gradient(
            circle at 35% 35%,
            #ffffff,
            #fff3ca 60%,
            #e6d7ff
        );

    box-shadow:

        0 0 30px #fff1c7,

        0 0 90px
        rgba(230,200,255,.55);

}


/* =========================
   STARS
========================= */

.star {

    position: absolute;

    width: 3px;

    height: 3px;

    border-radius: 50%;

    background: white;

    box-shadow:

        0 0 8px white;

    animation:

        twinkle
        2s
        ease-in-out
        infinite
        alternate;

}


@keyframes twinkle {

    from {
        opacity: .25;
    }

    to {
        opacity: 1;
    }

}


/* =========================
   GROUND
========================= */

#ground {

    position: absolute;

    left: 0;

    top: 650px;

    width: 2400px;

    height: 1150px;

    background:

        linear-gradient(
            180deg,
            #183b38,
            #0d2826
        );

}


/* =========================
   PATH
========================= */

.path {

    position: absolute;

    background:

        linear-gradient(
            90deg,
            #4c403d,
            #67564e,
            #4c403d
        );

    border-radius: 50%;

}


/* Main path */

#path1 {

    left: 1050px;

    top: 650px;

    width: 220px;

    height: 1150px;

}


/* Horizontal path */

#path2 {

    left: 350px;

    top: 1050px;

    width: 1600px;

    height: 180px;

}


/* =========================
   TREES
========================= */

.tree {

    position: absolute;

    width: 120px;

    height: 190px;

}


.trunk {

    position: absolute;

    left: 52px;

    bottom: 0;

    width: 18px;

    height: 85px;

    background:

        linear-gradient(
            90deg,
            #171014,
            #4b302d,
            #171014
        );

    border-radius: 6px;

}


.leaves {

    position: absolute;

    left: 0;

    top: 0;

    width: 120px;

    height: 125px;

    border-radius: 50%;

    background:

        radial-gradient(
            circle at 30% 25%,
            #4b7770,
            #285550 50%,
            #143c3b 85%
        );

    box-shadow:

        30px 25px 0 #234b47,

        70px 10px 0 #1c413e;

}


/* =========================
   HOUSE
========================= */

#house {

    position: absolute;

    left: 350px;

    top: 780px;

    width: 260px;

    height: 170px;

    background:

        linear-gradient(
            180deg,
            #4c394d,
            #292032
        );

    border-radius: 6px;

    box-shadow:

        0 25px 60px
        rgba(0,0,0,.5);

}


#roof {

    position: absolute;

    left: -30px;

    top: -90px;

    width: 320px;

    height: 140px;

    background: #211927;

    clip-path:

        polygon(
            50% 0,
            100% 70%,
            0 70%
        );

}


#door {

    position: absolute;

    bottom: 0;

    left: 105px;

    width: 50px;

    height: 95px;

    background: #1b1220;

}


.window {

    position: absolute;

    top: 45px;

    width: 50px;

    height: 60px;

    background: #ffe59c;

    box-shadow:

        0 0 25px #ffe59c;

}


#windowLeft {

    left: 30px;

}


#windowRight {

    right: 30px;

}


/* =========================
   MISTY PLAYER
========================= */

#player {

    position: absolute;

    width: 60px;

    height: 95px;

    z-index: 100;

}


#playerHair {

    position: absolute;

    top: 0;

    left: 7px;

    width: 46px;

    height: 48px;

    border-radius:

        50%
        50%
        45%
        45%;

    background: #17101d;

}


#playerFace {

    position: absolute;

    top: 11px;

    left: 14px;

    width: 32px;

    height: 36px;

    border-radius: 45%;

    background: #d99b7a;

    z-index: 2;

}


#playerBody {

    position: absolute;

    top: 45px;

    left: 8px;

    width: 44px;

    height: 48px;

    border-radius:

        14px
        14px
        7px
        7px;

    background:

        linear-gradient(
            180deg,
            #c76de5,
            #70429c
        );

}


/* =========================
   MESSAGE
========================= */

#message {

    position: fixed;

    top: 15px;

    left: 50%;

    transform:

        translateX(-50%);

    z-index: 500;

    text-align: center;

    pointer-events: none;

}


#message h1 {

    font-size: 25px;

    text-shadow:

        0 0 20px
        rgba(190,130,255,.8);

}


#message p {

    margin-top: 5px;

    color: #d9cee5;

}


/* =========================
   CONTROLS
========================= */

#controls {

    position: fixed;

    left: 20px;

    bottom: 20px;

    width: 170px;

    height: 170px;

    z-index: 1000;

}


.control {

    position: absolute;

    width: 55px;

    height: 55px;

    display: flex;

    align-items: center;

    justify-content: center;

    border-radius: 16px;

    background:

        rgba(30,20,50,.85);

    border:

        1px solid
        rgba(255,255,255,.25);

    color: white;

    font-size: 24px;

    user-select: none;

}


#up {

    top: 0;

    left: 57px;

}


#down {

    bottom: 0;

    left: 57px;

}


#left {

    top: 57px;

    left: 0;

}


#right {

    top: 57px;

    right: 0;

}


/* =========================
   MOBILE
========================= */

@media
(max-width: 600px) {

    #controls {

        transform:
            scale(.85);

        transform-origin:
            bottom left;

    }

}

</style>

</head>


<body>


<!-- =========================
     CAMERA
========================= -->

<div id="camera">


    <!-- =========================
         WORLD
    ========================= -->

    <div id="world">


        <!-- SKY -->

        <div id="sky"></div>


        <!-- STARS -->

        <div class="star"
             style="left:100px;top:100px;">
        </div>

        <div class="star"
             style="left:250px;top:200px;">
        </div>

        <div class="star"
             style="left:450px;top:120px;">
        </div>

        <div class="star"
             style="left:650px;top:250px;">
        </div>

        <div class="star"
             style="left:850px;top:100px;">
        </div>

        <div class="star"
             style="left:1100px;top:200px;">
        </div>

        <div class="star"
             style="left:1350px;top:100px;">
        </div>

        <div class="star"
             style="left:1550px;top:230px;">
        </div>

        <div class="star"
             style="left:1750px;top:90px;">
        </div>

        <div class="star"
             style="left:2100px;top:240px;">
        </div>


        <!-- MOON -->

        <div id="moon"></div>


        <!-- GROUND -->

        <div id="ground"></div>


        <!-- PATHS -->

        <div
            class="path"
            id="path1">
        </div>

        <div
            class="path"
            id="path2">
        </div>


        <!-- =========================
             TREES
        ========================= -->


        <div
            class="tree"
            style="left:100px;top:700px;">

            <div class="leaves"></div>

            <div class="trunk"></div>

        </div>


        <div
            class="tree"
            style="left:750px;top:750px;">

            <div class="leaves"></div>

            <div class="trunk"></div>

        </div>


        <div
            class="tree"
            style="left:1450px;top:700px;">

            <div class="leaves"></div>

            <div class="trunk"></div>

        </div>


        <div
            class="tree"
            style="left:2050px;top:700px;">

            <div class="leaves"></div>

            <div class="trunk"></div>

        </div>


        <div
            class="tree"
            style="left:150px;top:1350px;">

            <div class="leaves"></div>

            <div class="trunk"></div>

        </div>


        <div
            class="tree"
            style="left:700px;top:1450px;">

            <div class="leaves"></div>

            <div class="trunk"></div>

        </div>


        <div
            class="tree"
            style="left:1500px;top:1400px;">

            <div class="leaves"></div>

            <div class="trunk"></div>

        </div>


        <div
            class="tree"
            style="left:2150px;top:1300px;">

            <div class="leaves"></div>

            <div class="trunk"></div>

        </div>


        <!-- =========================
             HOUSE
        ========================= -->

        <div id="house">


            <div id="roof"></div>


            <div
                class="window"
                id="windowLeft">
            </div>


            <div
                class="window"
                id="windowRight">
            </div>


            <div id="door"></div>


        </div>


        <!-- =========================
             MISTY
        ========================= -->

        <div id="player">


            <div id="playerHair"></div>


            <div id="playerFace"></div>


            <div id="playerBody"></div>


        </div>


    </div>


</div>


<!-- =========================
     MESSAGE
========================= -->

<div id="message">

    <h1>
        Find Ezaz 🌙
    </h1>

    <p>
        Explore the world, Misty...
    </p>

</div>


<!-- =========================
     CONTROLS
========================= -->

<div id="controls">


    <div
        class="control"
        id="up">

        ↑

    </div>


    <div
        class="control"
        id="down">

        ↓

    </div>


    <div
        class="control"
        id="left">

        ←

    </div>


    <div
        class="control"
        id="right">

        →

    </div>


</div>


<script>


/* =========================
   PLAYER POSITION
========================= */


let playerX = 1200;

let playerY = 1000;

let speed = 4;

let moving = false;

let direction = null;


/* =========================
   ELEMENTS
========================= */


const player =

    document.getElementById(
        "player"
    );


const world =

    document.getElementById(
        "world"
    );


/* =========================
   START POSITION
========================= */


function updatePlayer() {


    player.style.left =

        playerX + "px";


    player.style.top =

        playerY + "px";


}


/* =========================
   MOVEMENT
========================= */


function startMoving(
    newDirection
) {

    moving = true;

    direction =
        newDirection;

}


function stopMoving() {

    moving = false;

    direction = null;

}


/* =========================
   CONTROLS
========================= */


document
    .querySelectorAll(
        ".control"
    )
    .forEach(

        function(button) {


            button.addEventListener(

                "touchstart",

                function(event) {

                    event.preventDefault();

                    startMoving(
                        button.id
                    );

                }

            );


            button.addEventListener(

                "touchend",

                function(event) {

                    event.preventDefault();

                    stopMoving();

                }

            );


            button.addEventListener(

                "mousedown",

                function() {

                    startMoving(
                        button.id
                    );

                }

            );


            button.addEventListener(

                "mouseup",

                function() {

                    stopMoving();

                }

            );


        }

    );


/* =========================
   CAMERA
========================= */


function updateCamera() {


    const screenWidth =

        window.innerWidth;


    const screenHeight =

        window.innerHeight;


    let cameraX =

        screenWidth / 2

        -

        playerX

        -

        30;


    let cameraY =

        screenHeight / 2

        -

        playerY

        -

        45;


    /* Keep camera inside world */


    const minCameraX =

        screenWidth

        -

        2400;


    const minCameraY =

        screenHeight

        -

        1800;


    cameraX =

        Math.min(

            0,

            Math.max(

                minCameraX,

                cameraX

            )

        );


    cameraY =

        Math.min(

            0,

            Math.max(

                minCameraY,

                cameraY

            )

        );


    world.style.transform =

        "translate("

        +

        cameraX

        +

        "px,"

        +

        cameraY

        +

        "px)";


}


/* =========================
   GAME LOOP
========================= */


function gameLoop() {


    if (moving) {


        if (
            direction === "up"
        ) {

            playerY -= speed;

        }


        if (
            direction === "down"
        ) {

            playerY += speed;

        }


        if (
            direction === "left"
        ) {

            playerX -= speed;

        }


        if (
            direction === "right"
        ) {

            playerX += speed;

        }


        /* WORLD BOUNDARIES */


        playerX =

            Math.max(

                30,

                Math.min(

                    2310,

                    playerX

                )

            );


        playerY =

            Math.max(

                650,

                Math.min(

                    1680,

                    playerY

                )

            );


        updatePlayer();

        updateCamera();


    }


    requestAnimationFrame(
        gameLoop
    );

}


/* =========================
   START
========================= */


updatePlayer();

updateCamera();

gameLoop();


</script>


</body>

  </html>
