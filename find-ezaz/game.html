<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Find Ezaz</title>

<style>

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    overflow: hidden;
    background: #07030f;
    color: white;
    font-family: Georgia, "Noto Serif Bengali", serif;
}

/* START SCREEN */

#startScreen {
    position: fixed;
    inset: 0;
    z-index: 1000;

    display: flex;
    align-items: center;
    justify-content: center;

    text-align: center;

    background:
        radial-gradient(
            circle at center,
            #39245c,
            #08040f 70%
        );
}

.startBox {
    width: 90%;
    max-width: 500px;
}

.startBox h1 {
    font-size: 50px;
    color: #f1d9ff;

    text-shadow:
        0 0 20px #a96cff;
}

.startBox p {
    margin-top: 20px;
    line-height: 1.8;
}

#playButton {

    margin-top: 30px;

    padding: 15px 40px;

    border: none;

    border-radius: 30px;

    background:
        linear-gradient(
            135deg,
            #9c5eea,
            #d568e8
        );

    color: white;

    font-size: 18px;

    font-family: inherit;

    cursor: pointer;

}


/* GAME */

#game {
    display: none;

    position: fixed;
    inset: 0;

    overflow: hidden;

    background:
        radial-gradient(
            circle at 50% 10%,
            #35265e,
            #0a0714 70%
        );
}


/* MOON */

#moon {

    position: absolute;

    width: 100px;
    height: 100px;

    right: 10%;
    top: 8%;

    border-radius: 50%;

    background: #fff2c9;

    box-shadow:
        0 0 20px #fff2c9,
        0 0 70px rgba(230,190,255,.6);

}


/* WORLD */

#world {

    position: absolute;

    width: 1800px;
    height: 1200px;

    left: 50%;
    top: 50%;

    transform:
        translate(-50%, -50%);

    background:

        radial-gradient(
            ellipse,
            #29434b,
            #142530 60%,
            #081018
        );

}


/* TREES */

.tree {

    position: absolute;

    width: 80px;
    height: 120px;

}

.tree::before {

    content: "";

    position: absolute;

    bottom: 0;
    left: 34px;

    width: 12px;
    height: 50px;

    background: #3c2929;

}

.tree::after {

    content: "";

    position: absolute;

    bottom: 35px;
    left: 0;

    width: 80px;
    height: 80px;

    border-radius: 50%;

    background: #18383b;

    box-shadow:
        25px -20px 0 #21494a,
        50px 0 0 #163538;

}


/* MEMORIES */

.memory {

    position: absolute;

    width: 60px;
    height: 60px;

    border-radius: 50%;

    background:
        radial-gradient(
            circle,
            white,
            #d7a2ff 30%,
            #914cff 70%
        );

    box-shadow:
        0 0 20px #c17cff,
        0 0 50px #9d50ff;

    animation:
        float 2s infinite alternate;

}

@keyframes float {

    from {
        transform: translateY(0);
    }

    to {
        transform: translateY(-12px);
    }

}


/* PLAYER */

#player {

    position: absolute;

    width: 50px;
    height: 70px;

    left: 875px;
    top: 600px;

}

.head {

    position: absolute;

    width: 32px;
    height: 32px;

    left: 9px;

    border-radius: 50%;

    background: #d89b78;

}

.body {

    position: absolute;

    width: 42px;
    height: 38px;

    top: 30px;
    left: 4px;

    border-radius: 12px;

    background: #9c67c8;

}


/* UI */

#ui {

    position: fixed;

    top: 15px;
    left: 15px;
    right: 15px;

    display: flex;

    justify-content:
        space-between;

    z-index: 100;

}

#count {

    padding: 8px 15px;

    border-radius: 20px;

    background:
        rgba(10,5,20,.8);

}


/* CONTROLS */

#controls {

    position: fixed;

    bottom: 20px;
    left: 20px;

    width: 150px;
    height: 150px;

    z-index: 200;

}

.control {

    position: absolute;

    width: 50px;
    height: 50px;

    display: flex;

    align-items: center;
    justify-content: center;

    border-radius: 15px;

    background:
        rgba(30,20,50,.85);

    color: white;

    font-size: 22px;

}

#up {
    left: 50px;
    top: 0;
}

#down {
    left: 50px;
    bottom: 0;
}

#left {
    left: 0;
    top: 50px;
}

#right {
    right: 0;
    top: 50px;
}


/* DIALOGUE */

#dialogue {

    position: fixed;

    bottom: 120px;

    left: 50%;

    transform:
        translateX(-50%);

    width: 90%;
    max-width: 500px;

    padding: 20px;

    text-align: center;

    background:
        rgba(10,5,20,.95);

    border-radius: 20px;

    z-index: 500;

    display: none;

}

#dialogue button {

    margin-top: 15px;

    padding: 10px 25px;

    border: none;

    border-radius: 20px;

    background: #9d62ed;

    color: white;

}

</style>

</head>


<body>


<!-- START SCREEN -->

<div id="startScreen">

    <div class="startBox">

        <h1>
            Find Ezaz 🌙
        </h1>

        <p>

            Misty...

            <br><br>

            Ezaz হারিয়ে গেছে।

            <br>

            তোমাকে তাকে খুঁজে বের করতে হবে।

            <br><br>

            <i>
            Ezaz is somewhere in this world.
            <br>
            Find him.
            </i>

        </p>

        <button id="playButton">

            Play Game

        </button>

    </div>

</div>


<!-- GAME -->

<div id="game">


    <div id="moon"></div>


    <div id="world">


        <!-- TREES -->

        <div class="tree"
             style="left:200px;top:200px;">
        </div>

        <div class="tree"
             style="left:400px;top:700px;">
        </div>

        <div class="tree"
             style="left:1300px;top:200px;">
        </div>

        <div class="tree"
             style="left:1500px;top:700px;">
        </div>


        <!-- MEMORIES -->

        <div class="memory"
             style="left:400px;top:400px;"
             data-memory="1">
        </div>

        <div class="memory"
             style="left:1300px;top:400px;"
             data-memory="2">
        </div>

        <div class="memory"
             style="left:800px;top:900px;"
             data-memory="3">
        </div>


        <!-- PLAYER -->

        <div id="player">

            <div class="head"></div>

            <div class="body"></div>

        </div>


    </div>


</div>


<!-- UI -->

<div id="ui">

    <div>
        FIND EZAZ
    </div>

    <div id="count">

        Memories: 0 / 3

    </div>

</div>


<!-- DIALOGUE -->

<div id="dialogue">

    <div id="dialogueText"></div>

    <button id="closeDialogue">

        Continue

    </button>

</div>


<!-- CONTROLS -->

<div id="controls">

    <div class="control"
         id="up">

        ↑

    </div>

    <div class="control"
         id="down">

        ↓

    </div>

    <div class="control"
         id="left">

        ←

    </div>

    <div class="control"
         id="right">

        →

    </div>

</div>


<script>


/* VARIABLES */

let playerX = 875;

let playerY = 600;

let speed = 5;

let direction = null;

let moving = false;

let memories = 0;

let gameStarted = false;


/* GET ELEMENTS */

const playButton =
    document.getElementById(
        "playButton"
    );


const startScreen =
    document.getElementById(
        "startScreen"
    );


const game =
    document.getElementById(
        "game"
    );


const player =
    document.getElementById(
        "player"
    );


/* START BUTTON */

playButton.addEventListener(
    "click",
    function() {

        startScreen.style.display =
            "none";

        game.style.display =
            "block";

        gameStarted =
            true;

        showMessage(
            "Misty... 🌙<br><br>" +
            "Ezaz হারিয়ে গেছে।<br>" +
            "তিনটি glowing memory খুঁজে বের করো।"
        );

    }
);


/* MOVEMENT */

function startMove(
    dir
) {

    direction =
        dir;

    moving =
        true;

}


function stopMove() {

    moving =
        false;

    direction =
        null;

}


/* BUTTON EVENTS */

const controls =
    document.querySelectorAll(
        ".control"
    );


controls.forEach(
    function(button) {

        button.addEventListener(
            "touchstart",
            function(event) {

                event.preventDefault();

                startMove(
                    button.id
                );

            }
        );


        button.addEventListener(
            "touchend",
            function(event) {

                event.preventDefault();

                stopMove();

            }
        );

    }
);


/* UPDATE PLAYER */

function updatePlayer() {

    player.style.left =
        playerX + "px";

    player.style.top =
        playerY + "px";

}


/* CHECK MEMORIES */

function checkMemories() {

    const objects =
        document.querySelectorAll(
            ".memory"
        );


    objects.forEach(
        function(memory) {

            if (
                memory.dataset.collected
            ) {

                return;

            }


            const x =
                parseInt(
                    memory.style.left
                );


            const y =
                parseInt(
                    memory.style.top
                );


            const distance =
                Math.sqrt(

                    Math.pow(
                        playerX - x,
                        2
                    )

                    +

                    Math.pow(
                        playerY - y,
                        2
                    )

                );


            if (
                distance < 70
            ) {

                memory.dataset.collected =
                    "true";

                memory.style.display =
                    "none";

                memories++;

                document
                    .getElementById(
                        "count"
                    )
                    .textContent =
                    "Memories: " +
                    memories +
                    " / 3";


                showMessage(

                    "Memory found! ✨<br><br>" +

                    "তুমি একটা memory খুঁজে পেয়েছো।"

                );


                if (
                    memories === 3
                ) {

                    setTimeout(
                        function() {

                            showMessage(

                                "তুমি তিনটি memory-ই খুঁজে পেয়েছো। ❤️<br><br>" +

                                "এখন Ezaz-কে খুঁজে বের করার সময়।"

                            );

                        },
                        500
                    );

                }

            }

        }
    );

}


/* DIALOGUE */

function showMessage(
    text
) {

    document
        .getElementById(
            "dialogueText"
        )
        .innerHTML =
        text;


    document
        .getElementById(
            "dialogue"
        )
        .style.display =
        "block";

}


document
    .getElementById(
        "closeDialogue"
    )
    .addEventListener(
        "click",
        function() {

            document
                .getElementById(
                    "dialogue"
                )
                .style.display =
                "none";

        }
    );


/* GAME LOOP */

function gameLoop() {

    if (
        gameStarted &&
        moving
    ) {

        if (
            direction === "up"
        ) {

            playerY -= speed;

        }

        if (
            direction === "down"
        ) {

            playerY += speed;

        }

        if (
            direction === "left"
        ) {

            playerX -= speed;

        }

        if (
            direction === "right"
        ) {

            playerX += speed;

        }


        playerX =
            Math.max(
                0,
                Math.min(
                    1750,
                    playerX
                )
            );


        playerY =
            Math.max(
                0,
                Math.min(
                    1150,
                    playerY
                )
            );


        updatePlayer();

        checkMemories();

    }


    requestAnimationFrame(
        gameLoop
    );

}


/* START */

updatePlayer();

gameLoop();


</script>


</body>

</html>
