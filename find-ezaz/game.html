<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Find Ezaz</title>

<style>

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

html,
body {
    width: 100%;
    height: 100%;
    overflow: hidden;
}

body {
    background: #080512;
    color: white;
    font-family: Georgia, "Noto Serif Bengali", serif;
}

#game {
    position: fixed;
    inset: 0;
    overflow: hidden;

    background:
        radial-gradient(
            circle at 50% 15%,
            #4a3670,
            #171127 45%,
            #05030a 100%
        );
}

#moon {
    position: absolute;

    width: 100px;
    height: 100px;

    right: 10%;
    top: 8%;

    border-radius: 50%;

    background: #fff1c7;

    box-shadow:
        0 0 25px #fff1c7,
        0 0 80px rgba(255,220,170,.5);
}

.star {
    position: absolute;

    width: 3px;
    height: 3px;

    background: white;

    border-radius: 50%;

    box-shadow:
        0 0 8px white;
}

#title {
    position: absolute;

    top: 35%;

    width: 100%;

    text-align: center;
}

#title h1 {
    font-size: 50px;

    text-shadow:
        0 0 20px #b56cff;
}

#title p {
    margin-top: 20px;

    line-height: 1.8;

    color: #e7dff0;
}

#playButton {

    display: inline-block;

    margin-top: 30px;

    padding: 15px 40px;

    border: none;

    border-radius: 30px;

    background:
        linear-gradient(
            135deg,
            #9c5eea,
            #d568e8
        );

    color: white;

    font-size: 18px;

    font-family: inherit;

    text-decoration: none;

    cursor: pointer;

}

</style>

</head>


<body>


<div id="game">


    <div class="star"
         style="left:10%;top:10%;">
    </div>

    <div class="star"
         style="left:20%;top:25%;">
    </div>

    <div class="star"
         style="left:35%;top:8%;">
    </div>

    <div class="star"
         style="left:50%;top:20%;">
    </div>

    <div class="star"
         style="left:65%;top:12%;">
    </div>

    <div class="star"
         style="left:80%;top:25%;">
    </div>


    <div id="moon"></div>


    <div id="title">

        <h1>

            Find Ezaz 🌙

        </h1>


        <p>

            Misty...

            <br><br>

            Ezaz হারিয়ে গেছে।

            <br>

            তোমাকে তাকে খুঁজে বের করতে হবে।

            <br><br>

            <i>

            Ezaz is somewhere in this world.

            <br>

            Find him.

            </i>

        </p>


        <!-- NORMAL LINK BUTTON -->

        <a
            id="playButton"
            href="game2.html"
        >

            Start Game

        </a>


    </div>


</div>


</body>

</html>
